services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        # Leave empty — client connects via relative path through nginx
        VITE_SERVER_URL: ""
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server